
<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorkLog – PDF drukas skats (oriģinālais, tabulas režīms)</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E">
  <link rel="stylesheet" href="./print.css?v=tab3" />
</head>
<body>
  <div class="container no-print">
    <div class="controls">
      <label>Mēnesis:
        <input type="month" id="monthInput" />
      </label>
      <button id="printBtn">Drukāt / Saglabāt PDF</button>
      <button id="exitBtn" class="secondary">Iziet</button>
    </div>
    <div class="small">
      <strong>Bez bibliotēkām.</strong> Spied <em>Drukāt</em>
    </div>
  </div>

  <div class="container">
    <div class="header header--grad-blue" id="headerBlock">
      <h1 id="headerTitle">—</h1>
      <p id="headerLine1">—</p>
    </div>

    <div class="sheet">
      <div class="table" role="table" aria-label="Dienu ierakstu tabula">
        <div class="thead" role="rowgroup">
          <div class="tr" role="row">
            <div class="th col-date" role="columnheader">Datums</div>
            <div class="th col-ko-ot" role="columnheader">Kopā · O/t</div>
            <div class="th col-entries" role="columnheader">Ieraksti</div>
          </div>
        </div>
        <div id="tbody" class="tbody" role="rowgroup"></div>
      </div>
    </div>
  </div>

  <script src="./print.js?v=tab3"></script>
</body>
</html>
